<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Scout Latino — Plataforma de Scouting Profesional para el Fútbol Latinoamericano" />
    <meta name="theme-color" content="#040a0f" />
    <title>Scout Latino ⚽</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #040a0f; color: #eef2f6; }
      #root { min-height: 100vh; }
      #loading {
        position: fixed; inset: 0; background: #040a0f;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: system-ui, sans-serif; color: #4a6070;
        z-index: 9999;
      }
      .spin {
        width: 56px; height: 56px; border-radius: 14px;
        background: linear-gradient(135deg, #00e87a, #00c96a);
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; margin-bottom: 20px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(.95)} }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spin">⚽</div>
      <div style="font-size:18px;font-weight:700;color:#eef2f6;margin-bottom:6px">Scout Latino</div>
      <div style="font-size:13px">Cargando plataforma...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const l = document.getElementById('loading');
          if (l) l.style.display = 'none';
        }, 300);
      });
    </script>
  </body>
</html>
