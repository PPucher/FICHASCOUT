<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FichaScout — Plataforma profesional de scouting para el fútbol latinoamericano" />
    <meta name="theme-color" content="#040a0f" />
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <title>FichaScout ⚽</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #040a0f; color: #eef2f6; }
      #root { min-height: 100vh; }
      #splash {
        position: fixed; inset: 0; background: #040a0f;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: system-ui, sans-serif; z-index: 9999;
        transition: opacity .4s;
      }
      .splash-icon {
        width: 58px; height: 58px; border-radius: 15px;
        background: linear-gradient(135deg, #00e87a, #00c96a);
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; margin-bottom: 16px;
        animation: pulse 1.4s ease-in-out infinite;
      }
      .splash-name { font-weight: 800; font-size: 20px; color: #eef2f6; margin-bottom: 5px; }
      .splash-name span { color: #00e87a; }
      .splash-sub { font-size: 12px; color: #4a6070; }
      @keyframes pulse {
        0%,100%{opacity:1;transform:scale(1)}
        50%{opacity:.75;transform:scale(.94)}
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-icon">⚽</div>
      <div class="splash-name">Ficha<span>Scout</span></div>
      <div class="splash-sub">Cargando plataforma...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.style.opacity='0'; setTimeout(()=>s.remove(),400); }
        }, 500);
      });
    </script>
  </body>
</html>
